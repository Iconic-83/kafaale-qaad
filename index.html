<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kafaala Qaad HOPE — Humanitarian Aid Platform</title>
    <meta name="description" content="Kafaala Qaad HOPE — Transparent humanitarian aid from report to delivery. 100% verified cases, GPS-tracked aid delivery, secure escrow payments." />
    <meta name="theme-color" content="#002651" />

    <!-- ── PWA: iOS / iPhone support ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kafaale Qaad" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Favicons & App Icons ── -->
    <link rel="icon" href="/assets/brand/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/kafaala-qaad-hope-icon-32.png" />
    <!-- iOS requires multiple apple-touch-icon sizes -->
    <link rel="apple-touch-icon" href="/assets/brand/kafaala-qaad-hope-icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/brand/kafaala-qaad-hope-icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/assets/brand/kafaala-qaad-hope-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/kafaala-qaad-hope-icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph / Social ── -->
    <meta property="og:title" content="Kafaala Qaad HOPE — Humanitarian Aid Platform" />
    <meta property="og:description" content="Transparent aid from report to delivery. Every case field-verified. GPS proof of delivery." />
    <meta property="og:image" content="/assets/brand/kafaala-qaad-hope-icon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/assets/brand/kafaala-qaad-hope-icon-512.png" />

    <!-- Fonts: Lexend (headings, accessibility-designed) + Source Sans 3 (body) + Inter (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Source+Sans+3:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      /* ── Kafaala Qaad HOPE — Brand CSS Variables ── */
      :root {
        --kf-navy:       #002651;
        --kf-blue:       #004B96;
        --kf-blue-light: #1A6CB5;
        --kf-green:      #4B7D19;
        --kf-green-dark: #324B00;
        --kf-green-light:#6A9C2A;
        --kf-gold:       #E0AB21;
        --kf-gold-dark:  #B8861A;
        --kf-gold-light: #F4D04A;
        --kf-bg:         #F4F7FC;
        --kf-card:       #FFFFFF;
        --kf-border:     #D8E4F0;
        --kf-text:       #0D1F3C;
        --kf-muted:      #5A6E8A;
        --kf-dark-bg:    #001A40;
        --kf-dark-card:  #00244F;
        --kf-danger:     #C0392B;
        --kf-shadow:     0 2px 16px rgba(0,38,81,0.12);
        --kf-shadow-lg:  0 8px 40px rgba(0,38,81,0.18);
      }

      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0; padding: 0;
        font-family: 'Source Sans 3', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: var(--kf-bg);
        color: var(--kf-text);
        overflow-x: hidden;
        font-size: 16px;
        line-height: 1.7;
      }

      /* ── Lexend for all headings — designed for readability ── */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Lexend', 'Inter', system-ui, sans-serif;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }
      #root, html, body { max-width: 100vw; overflow-x: hidden; }

      /* ── Focus rings using brand blue ── */
      :focus-visible { outline: 2px solid var(--kf-blue); outline-offset: 2px; }

      /* ── Selection color ── */
      ::selection { background: var(--kf-gold-light); color: var(--kf-navy); }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--kf-bg); }
      ::-webkit-scrollbar-thumb { background: var(--kf-blue-light); border-radius: 3px; }

      /* ── Links ── */
      a { color: var(--kf-blue); }
      a:hover { color: var(--kf-green); }

      /* ── Touch highlight ── */
      * { -webkit-tap-highlight-color: transparent; }
      input, select, textarea, button { font-family: inherit; }

      /* ── Mobile helpers ── */
      @media (max-width: 640px) { .hide-mobile { display: none !important; } }
      @media (min-width: 641px) { .hide-mobile { display: block !important; } }

      /* ── Brand gradient utilities ── */
      .kf-grad-primary { background: linear-gradient(135deg, #002651 0%, #004B96 100%); }
      .kf-grad-green   { background: linear-gradient(135deg, #324B00 0%, #4B7D19 100%); }
      .kf-grad-full    { background: linear-gradient(135deg, #002651 0%, #004B96 50%, #4B7D19 100%); }
      .kf-grad-gold    { background: linear-gradient(135deg, #B8861A 0%, #E0AB21 100%); }

      /* ── Loading animation ── */
      @keyframes kf-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(0.9); }
      }
      @keyframes kf-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes kf-fade-in {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes kf-fade-up {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes kf-scale-in {
        from { opacity: 0; transform: scale(0.94); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* ── Interactive card hover ── */
      .kf-card {
        transition: transform 0.22s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.22s ease;
      }
      .kf-card:hover {
        transform: translateY(-5px) !important;
        box-shadow: 0 20px 52px rgba(0,38,81,0.13) !important;
      }

      /* ── Buttons ── */
      .kf-btn {
        transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        cursor: pointer;
        text-decoration: none !important;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .kf-btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
      .kf-btn:active { transform: translateY(0) !important; }

      .kf-btn-gold {
        background: linear-gradient(135deg, #E0AB21 0%, #c8951a 100%) !important;
        box-shadow: 0 4px 18px rgba(224,171,33,0.40) !important;
        color: #fff !important;
      }
      .kf-btn-gold:hover { box-shadow: 0 10px 30px rgba(224,171,33,0.55) !important; }

      .kf-btn-navy {
        background: linear-gradient(135deg, #004B96 0%, #002651 100%) !important;
        box-shadow: 0 4px 18px rgba(0,38,81,0.30) !important;
        color: #fff !important;
      }
      .kf-btn-navy:hover { box-shadow: 0 10px 30px rgba(0,38,81,0.44) !important; }

      .kf-btn-green {
        background: linear-gradient(135deg, #4B7D19 0%, #324B00 100%) !important;
        box-shadow: 0 4px 18px rgba(75,125,25,0.35) !important;
        color: #fff !important;
      }
      .kf-btn-green:hover { box-shadow: 0 10px 30px rgba(75,125,25,0.50) !important; }

      .kf-btn-ghost {
        background: rgba(255,255,255,0.10) !important;
        border: 1.5px solid rgba(255,255,255,0.28) !important;
        color: #fff !important;
        backdrop-filter: blur(8px);
      }
      .kf-btn-ghost:hover { background: rgba(255,255,255,0.20) !important; }

      .kf-btn-outline {
        background: transparent !important;
        border: 2px solid var(--kf-blue) !important;
        color: var(--kf-blue) !important;
      }
      .kf-btn-outline:hover { background: var(--kf-blue) !important; color: #fff !important; }

      /* ── Eyebrow / badge ── */
      .kf-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 14px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.7px;
        text-transform: uppercase;
      }

      /* ── Accent rule (colored underline for headings) ── */
      .kf-rule {
        width: 44px; height: 3px;
        background: linear-gradient(90deg, #004B96, #4B7D19);
        border-radius: 2px;
        margin: 10px 0 20px;
        border: none;
      }
      .kf-rule-center {
        width: 44px; height: 3px;
        background: linear-gradient(90deg, #004B96, #4B7D19);
        border-radius: 2px;
        margin: 10px auto 22px;
        border: none;
      }

      /* ── Hero dot-grid overlay ── */
      .kf-hero-dots {
        background-image: radial-gradient(circle, rgba(255,255,255,0.10) 1px, transparent 1px);
        background-size: 30px 30px;
      }

      /* ── Progress bar ── */
      .kf-prog-track { height: 5px; background: rgba(0,38,81,0.09); border-radius: 100px; overflow: hidden; }
      .kf-prog-fill  { height: 100%; border-radius: 100px; }

      /* ── Input focus ring ── */
      .kf-input:focus {
        border-color: #004B96 !important;
        box-shadow: 0 0 0 3px rgba(0,75,150,0.13) !important;
        outline: none !important;
      }
      .kf-input { transition: border-color 0.15s, box-shadow 0.15s; }

      /* ── Trust check item ── */
      .kf-trust { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: #5A6E8A; }
      .kf-trust-check { width: 18px; height: 18px; background: #D1FAE5; color: #065F46; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; flex-shrink: 0; }

      /* ── Nav scrolled state (toggled by JS) ── */
      .kf-nav-scrolled { box-shadow: 0 4px 28px rgba(0,38,81,0.12) !important; }

      /* ── Glass card ── */
      .kf-glass {
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255,255,255,0.14);
      }

      /* ── Gradient text ── */
      .kf-text-gradient {
        background: linear-gradient(135deg, #004B96, #4B7D19);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Section fade-in ── */
      .kf-animate {
        animation: kf-fade-up 0.6s ease both;
      }

      /* ── Stat number ── */
      .kf-stat-num {
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -1px;
      }

      /* ── Feature card accent border ── */
      .kf-feature-card {
        border-left: 3px solid var(--kf-blue) !important;
        transition: border-color 0.2s, transform 0.2s;
      }
      .kf-feature-card:hover { border-left-color: var(--kf-green) !important; }

      /* ── Shine sweep on hover ── */
      .kf-shine { position: relative; overflow: hidden; }
      .kf-shine::after {
        content: '';
        position: absolute;
        top: 0; left: -80%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        transform: skewX(-15deg);
        transition: left 0.55s ease;
        pointer-events: none;
      }
      .kf-shine:hover::after { left: 130%; }

      /* ── Scroll-reveal animations (Intersection Observer) ── */
      .kf-reveal {
        opacity: 0;
        transform: translateY(32px);
        transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
      }
      .kf-reveal.kf-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .kf-reveal-left {
        opacity: 0;
        transform: translateX(-32px);
        transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
      }
      .kf-reveal-left.kf-visible { opacity: 1; transform: translateX(0); }
      .kf-reveal-right {
        opacity: 0;
        transform: translateX(32px);
        transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
      }
      .kf-reveal-right.kf-visible { opacity: 1; transform: translateX(0); }
      /* Staggered children */
      .kf-reveal-stagger > * {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
      }
      .kf-reveal-stagger.kf-visible > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0ms; }
      .kf-reveal-stagger.kf-visible > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:80ms; }
      .kf-reveal-stagger.kf-visible > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:160ms; }
      .kf-reveal-stagger.kf-visible > *:nth-child(4) { opacity:1; transform:translateY(0); transition-delay:240ms; }
      .kf-reveal-stagger.kf-visible > *:nth-child(5) { opacity:1; transform:translateY(0); transition-delay:320ms; }
      @media (prefers-reduced-motion: reduce) {
        .kf-reveal, .kf-reveal-left, .kf-reveal-right, .kf-reveal-stagger > * {
          opacity: 1 !important; transform: none !important; transition: none !important;
        }
      }

      /* ── Trust badge strip ── */
      .kf-trust-badge {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 8px 16px; border-radius: 100px;
        font-size: 12px; font-weight: 700;
        background: rgba(255,255,255,0.9);
        border: 1.5px solid rgba(0,75,150,0.12);
        color: var(--kf-navy);
        box-shadow: 0 2px 12px rgba(0,38,81,0.07);
        transition: transform 0.2s, box-shadow 0.2s;
        white-space: nowrap;
      }
      .kf-trust-badge:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,38,81,0.12); }
      .kf-trust-badge .icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Scroll-reveal — watches .kf-reveal, .kf-reveal-left, .kf-reveal-right, .kf-reveal-stagger
      (function() {
        const sel = '.kf-reveal, .kf-reveal-left, .kf-reveal-right, .kf-reveal-stagger';
        function observe() {
          const io = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('kf-visible'); io.unobserve(e.target); } });
          }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
          document.querySelectorAll(sel).forEach(el => io.observe(el));
        }
        // Re-run after React mounts (DOM changes)
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', observe); }
        else { observe(); }
        // MutationObserver to catch React renders
        const mo = new MutationObserver(() => {
          document.querySelectorAll(sel + ':not([class*="kf-visible"])').forEach(el => {
            if (!el._kfObserved) {
              el._kfObserved = true;
              const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('kf-visible'); io.unobserve(e.target); } });
              }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
              io.observe(el);
            }
          });
        });
        mo.observe(document.body || document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
